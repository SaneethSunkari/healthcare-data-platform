services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboard/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres-data:
  grafana-data:
